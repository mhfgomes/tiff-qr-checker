name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Windows Artifact
        run: bun run build:win

      - name: Build Linux Artifact
        run: bun run build:linux

      - name: Build macOS Artifact
        run: bun run build:mac

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiff-qr-checker-windows
          path: dist/tiff-qr-checker-win.exe
          if-no-files-found: error

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiff-qr-checker-linux
          path: dist/tiff-qr-checker-linux
          if-no-files-found: error

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiff-qr-checker-macos
          path: dist/tiff-qr-checker-macos
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tiff-qr-checker-win.exe
            dist/tiff-qr-checker-linux
            dist/tiff-qr-checker-macos
          generate_release_notes: true
