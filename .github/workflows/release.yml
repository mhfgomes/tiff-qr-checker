name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            archive_ext: zip
            binary_name: qrcheck.exe
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary_name: qrcheck
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            binary_name: qrcheck
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
            binary_name: qrcheck
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            binary_name: qrcheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive name
        id: names
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [ -z "$version" ] || [ "$version" = "${GITHUB_SHA}" ]; then
            version="manual-${GITHUB_SHA::7}"
          fi
          archive="qrcheck_${version}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}"
          dir="dist/${{ matrix.goos }}-${{ matrix.goarch }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "dir=$dir" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p "${{ steps.names.outputs.dir }}"
          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.names.outputs.version }}" \
            -o "${{ steps.names.outputs.dir }}/${{ matrix.binary_name }}" ./cmd/qrcheck

      - name: Package archive
        shell: bash
        run: |
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (
              cd "${{ steps.names.outputs.dir }}"
              zip -r "../../${{ steps.names.outputs.archive }}" .
            )
          else
            tar -C "${{ steps.names.outputs.dir }}" -czf "${{ steps.names.outputs.archive }}" .
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.names.outputs.archive }}
          path: ${{ steps.names.outputs.archive }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-flat
          find release-assets -type f -maxdepth 2 -exec cp {} release-flat/ \;

      - name: Generate checksums
        shell: bash
        run: |
          cd release-flat
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-flat/*
          generate_release_notes: true
